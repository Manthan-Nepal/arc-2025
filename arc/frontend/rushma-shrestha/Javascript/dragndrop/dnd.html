<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag and Drop widget</title>
    <link rel="stylesheet" href="dnd.css">
</head>

<body>
    <main>
        <section class="widget-container" id="widget-container">
            <div class="widget" draggable="true">1</div>
            <div class="widget" draggable="true">2</div>
            <div class="widget" draggable="true">3</div>
            <div class="widget" draggable="true">4</div>
            <div class="widget" draggable="true">5</div>
            <div class="widget" draggable="true">6</div>
            <div class="widget" draggable="true">7</div>
            <div class="widget" draggable="true">8</div>
            <div class="widget" draggable="true">9</div>
            <div class="widget" draggable="true">10</div>
            <div class="widget" draggable="true">11</div>
            <div class="widget" draggable="true">12</div>
        </section>
    </main>
    <script src="dnd.js"></script>
</body>

</html>
