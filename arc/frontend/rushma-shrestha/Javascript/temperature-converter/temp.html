<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature converter </title>
    <link rel="stylesheet" href="temp.css">
    
</head>
<body>
    <main>
        <header>
            <h1>Temperature Converter</h1>
        </header>
        <section class="inputs">
            <div class="cel">
                <label for="celsius"> Celsius:</label> <br><input class="input" id="celsius" type="text">
            </div>
            <div class="fer">
                <label for="fahrenheit"> Fahrenheit:</label> <br><input class="input"  id="fahrenheit" type="text">
            </div>
            <div class="kel">
                <label for="kelvin"> Kelvin:</label> <br><input class="input"  id="kelvin" type="text">
            </div>
        </section>
        <button class="button">Convert</button>
    </main>
    <script src="temp.js"></script>
</body>

</html>
