<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./css/main.css" />
        <title>Weather App</title>
    </head>
    <body>
        <div class="wholecontainer">
            <div class="navBar">
                <ul>
                    <li>
                        <a href="#"> Weather </a>
                    </li>
                    <li><a href="news.html"> News </a></li>
                </ul>
            </div>

            <div class="container">
                <div class="container__search">
                    <div class="container__search__input">
                        <input type="text" required="true" placeholder="Search Places">
                        <div class="container__search__image">
                            <img src="../public/search.png" alt="">
                        </div>
                    </div>
                </div>
                <div class="container__weatherInfo">
                    <div class="container__weatherInfo__placeName">
                    </div>
                    <div class="container__weatherInfo__icon">
                        <img src="../public/blocked.png" alt="">
                    </div>
                    <div id="weatherLoader"></div>
                    <div class="container__weatherInfo__temperature">
                        
                    </div>
                </div>
            </div>
        </div>
    </body>
    <script src="./js/main.js"></script>
</html>
