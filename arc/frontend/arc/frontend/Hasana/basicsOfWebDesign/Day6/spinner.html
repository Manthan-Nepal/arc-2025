<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinner</title>
    <link rel="stylesheet" href="./sass/spinner.css">
</head>
<body>
    <div class="flipcard">
        Hover to Flip
        <div class="flipcard__inner">
            <div class="flipcard__front">
                Card Front
            </div>
            <div class="flipcard__back">
                Card Back
            </div>
        </div>
    </div>
    <div class="spinner">
        <div class="spinner__button">
            <button>Spin Now</button>
        </div>
        <div class="spinner__loader"></div>
    </div>
</body>
<script src="./js/spinner.js"></script>
</html>
