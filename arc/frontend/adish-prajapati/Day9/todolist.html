<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    :root {
      --primary: #1f2937;
      --accent: #00bcd4;
      --light: #f5f5f5;
      --dark: #111827;
      --border: #00f;
      --green: #096b68;
      --gray: #393E46;
    }

    input:focus {
      border-color: var(--border);
      box-shadow: 0 0 10px var(--border), 0 0 20px var(--border);
    }

    textarea:focus {
      border-color: var(--border);
      box-shadow: 0 0 10px var(--border), 0 0 20px var(--border);
    }

    body {
      display: flex;
      justify-content: center;
      height: 100vh;
      align-items: center;
      background-color: var(--dark);
    }
    .task-item {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      background-color: var(--gray);
      margin-top: 5px;
      border-radius: 4px;
      height:50px;
      width:200px;
      padding:10px;
    }


    
  </style>
  <body>
    <div style="display: flex; flex-direction: column; gap: 1rem">
      <div
        style="
          display: flex;
          flex-direction: column;
          gap: 0.8rem;
          background-color: var(--primary);
          padding: 30px;
          border-radius: 5%;
          color: white;
        "
      >
        <h1>TODO LIST</h1>
        <section style="display: flex; flex-direction: column; gap: 2px">
          <input
            type="text"
            name="title"
            id="title"
            placeholder="enter your task"
            style="padding: 5px"
            style="border-radius: 5%"
          />
          <br />
          <textarea
            name="description"
            id="desc"
            placeholder="Task..."
            style="padding: 5px"
          ></textarea>
          <br />
          <button
            style="
              border-radius: 4px;
              background-color: var(--green);
              color: var(--light);
              box-shadow: 0 0 10px var(--green), 0 0 20px var(--green);
            "
            onclick="addTask()"
          >
            Add Task
          </button>
        </section>
      </div>

      <section id="displayTask">
        <ul id="taskList"></ul>
      </section>
    </div>

    <script>
      const Task = [];

      function addTask() {
        titleValue = document.querySelector("#title").value.trim();
        descValue = document.querySelector("#desc").value.trim();

        if (titleValue.trim() === "" || descValue.trim() === "") {
          alert("Please insert both title and task");
          return;
        }

        const tasks = {
          title: titleValue,
          description: descValue,
          completed: false,
        };

        Task.push(tasks);

        const listTask = document.querySelector("#taskList");
        const li = document.createElement("li");
        li.classList.add("task-item");

        li.innerHTML = `<div>
        <strong>${tasks.title}</strong> <br> ${tasks.description}
        </div>`;

        listTask.appendChild(li);

        console.log(Task);
        document.querySelector("#title").value = "";
        document.querySelector("#desc").value = "";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";

        checkbox.addEventListener("change", () => {
          tasks.completed = checkbox.checked;
        });

        const deleteBtn = document.createElement("button");
        deleteBtn.innerText = "Delete";

        li.classList.add("delete-item");


        deleteBtn.addEventListener("click", () => {
          li.remove();
          const index = Task.indexOf(tasks);
          if (index > -1) {
            Task.splice(index, -1);
          }
        });

        li.prepend(checkbox);
        li.appendChild(deleteBtn);
      }
    </script>
  </body>
</html>
