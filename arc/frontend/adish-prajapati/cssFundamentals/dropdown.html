<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pure CSS Dropdown</title>
    <style>
      nav {
        background: black;
      }

      nav ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
      }

      nav ul li {
        position: relative;
      }

      nav ul li a {
        display: block;
        padding: 14px 20px;
        color: white;
        text-decoration: none;
      }

      nav ul li:hover {
        background-color: teal;
      }

      nav ul li ul {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        background-color: #444;
        min-width: 160px;
      }

      nav ul li:hover ul {
        display: block;
      }

      nav ul li ul li a {
        padding: 12px 16px;
        color: white;
        white-space: nowrap;
      }

      nav ul li ul li a:hover {
        background-color: #555;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li>
          <a href="#">Projects</a>
          <ul>
            <li><a href="#">Projects 1</a></li>
            <li><a href="#">Projects 2</a></li>
            <li><a href="#">Projects 3</a></li>
          </ul>
        </li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </body>
</html>
