<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Blog</title>
</head>
<body>

  <header>
    <h1>My Blog</h1>
  </header>


  <section>
    <h2>Create New Post</h2>
    <form>
      <label>Title:<br>
        <input type="text" name="title" placeholder="Enter title" />
      </label>
      <br>
      <br>

      <label>Content:<br>
        <textarea name="content" rows="5" cols="40" placeholder="Write your post..."></textarea>
      </label>
      <br>
      <br>

      <button type="submit">Post</button>
    </form>
  </section>

</body>
</html>
