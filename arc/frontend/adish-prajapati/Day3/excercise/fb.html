<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook – log in or sign up</title>
    <link rel="stylesheet" href="fb.css">
</head>
<body>
    <div class="flex-container">
        <div class="fbintro">
            <div class="logo">facebook</div>
            <div class="motto">Facebook helps you connect and share<br>with the people in your life.</div>
        </div>
        <div>
            <div class="login-box">
                <input class="email" type="text" placeholder="Email address or phone number">
                <input class="password" type="password" placeholder="Password">
                <button class="login">Log in</button>
                <a class="forgetpassword" href="#">Forgotten password?</a>
                <hr class="line">
                <button class="account">Create new account</button>
            </div>
            <div class="create-page">
                <span><b>Create a Page</b> for a celebrity, brand or business.</span>
            </div>
        </div>
    </div>
</body>
</html>
