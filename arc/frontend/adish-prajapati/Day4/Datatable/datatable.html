<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Table to Card</title>
  <link rel="stylesheet" href="datatable.css" />
</head>
<body>
  <h1>Employee Directory</h1>
  <div class="table-wrapper">
    <table class="responsive-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Position</th>
          <th>Office</th>
          <th>Age</th>
          <th>Start Date</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td data-label="Name">John Nepali</td>
          <td data-label="Position">Developer</td>
          <td data-label="Office">Kathmandu</td>
          <td data-label="Age">35</td>
          <td data-label="Start Date">2019-01-15</td>
        </tr>
        <tr>
          <td data-label="Name">Jane Nepali</td>
          <td data-label="Position">Lalitpur</td>
          <td data-label="Office">London</td>
          <td data-label="Age">28</td>
          <td data-label="Start Date">2020-07-01</td>
        </tr>
        
      </tbody>
    </table>
  </div>
</body>
</html>
